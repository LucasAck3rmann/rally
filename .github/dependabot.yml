version: 2
updates:
  # Dependências JS/TS do monorepo
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:                  # agrupa minor/patch num PR só
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore"
      include: "scope"
    labels: ["dependencies"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:                   # todas as actions num PR só (menos ruído)
        patterns: ["*"]
    commit-message:
      prefix: "ci"
    labels: ["ci", "dependencies"]

  # Imagens Docker da API
  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    labels: ["docker", "dependencies"]
    ignore:
      # mantém Node 22 LTS — ignora bumps de major do Node (ex.: 26)
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  # Pacotes Dart/Flutter
  - package-ecosystem: "pub"
    directory: "/apps/mobile"
    schedule:
      interval: "weekly"
    labels: ["mobile", "dependencies"]
